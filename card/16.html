<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カード所持管理 / 欠損カードグリッド</title>
    <link rel="stylesheet" href="../css/default.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
        }
        .container {
            display: flex;
            max-width: 1200px;
            margin: 2em auto 10em auto;
            gap: 2em;
            padding: 0 2em;
        }
        .sidebar {
            width: 72px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            gap: 0.5rem;
        }
        .main-content {
            flex: 1;
            min-width: 0;
        }
        .page-card {
            background: var(--callout-bg);
            border: 1px solid var(--callout-border);
            border-radius: 18px;
            padding: 2rem;
        }
        .page-header {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }
        .page-header h1 {
            margin: 0;
            font-size: clamp(2rem, 2.5vw, 2.4rem);
        }
        .summary-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .summary-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 1rem;
            padding: 1rem;
            min-height: 84px;
        }
        .summary-card strong {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        .deck-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }
        .card-panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-panel h2 {
            margin-top: 0;
            color: var(--text-color);
        }
        .card-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .card-table th,
        .card-table td {
            border: 1px solid rgba(255,255,255,0.08);
            padding: 0.75rem;
            text-align: left;
            color: var(--text-color);
        }
        .card-table th {
            background: rgba(255,255,255,0.08);
        }
        .count-control {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .count-control button {
            width: 30px;
            height: 30px;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.08);
            color: var(--text-color);
            cursor: pointer;
        }
        .count-control button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .grid-preview {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .preview-card {
            min-height: 110px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 0.9rem;
            padding: 0.85rem;
            background: rgba(255,255,255,0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-color);
        }
        .preview-card span {
            display: block;
            color: var(--text-muted);
            margin-top: 0.35rem;
            font-size: 0.9rem;
        }
        .preview-empty {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .control-hint {
            margin-top: 0.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .canvas-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .canvas-actions button {
            min-width: 160px;
            padding: 0.85rem 1rem;
            border: none;
            border-radius: 999px;
            background: var(--accent-color);
            color: #111827;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .canvas-actions button:hover:not(:disabled) {
            background: var(--accent-green);
        }
        .canvas-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn {
            border: none;
            border-radius: 999px;
            padding: 0.85rem 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease, opacity 0.2s ease;
            color: #111827;
            background: rgba(255,255,255,0.14);
        }
        .btn:hover:not(:disabled) {
            opacity: 0.9;
        }
        .btn-primary {
            background: var(--accent-color);
            color: #111827;
        }
        .btn-success {
            background: #22c55e;
            color: #111827;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .sidebar-item {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border-radius: 12px;
            border: 1px solid transparent;
            color: var(--text-color);
            background: rgba(255,255,255,0.05);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sidebar-item:hover {
            border-color: var(--accent-color);
            background: rgba(139, 158, 125, 0.18);
        }
        .sidebar-item.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-green);
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <a href="cardview.html" class="sidebar-item" title="カード一覧">🎴</a>
            <a href="deckSelect.html" class="sidebar-item" title="対戦">⚔️</a>
            <a href="rules.html" class="sidebar-item" title="ルール">📖</a>
            <a href="16.html" class="sidebar-item active" title="印刷">🖨️</a>
            <a href="../index.html" class="sidebar-item" title="Wikiトップ">🏠</a>
        </aside>
        <main class="main-content">
            <section class="page-card">
                <div class="page-header">
                    <div>
                        <h1>カード所持管理 / 欠損カードグリッド</h1>
                        <p class="control-hint">エクスポートしたデッキJSONを読み込み、所持数を入力すると欠損カードを44グリッド表示できます。</p>
                    </div>
                    <div class="deck-actions">
                        <button class="btn btn-primary" id="importDeckBtn"> デッキJSONを読み込む</button>
                        <button class="btn btn-primary" id="resetOwnershipBtn" disabled> 所持数をリセット</button>
                        <input type="file" id="deckFileInput" accept=".json" style="display:none">
                    </div>
                </div>

                <div class="summary-box">
                    <div class="summary-card">
                        <strong>デッキカード数</strong>
                        <span id="deckCardCount">0</span>
                    </div>
                    <div class="summary-card">
                        <strong>欠損カード数</strong>
                        <span id="missingCardCount">0</span>
                    </div>
                    <div class="summary-card">
                        <strong>グリッド枚数</strong>
                        <span id="gridCardCount">0 / 16</span>
                    </div>
                </div>

                <div class="card-panel">
                    <h2>カード一覧</h2>
                    <div class="control-hint">所持数を変更すると欠損数が自動再計算されます。</div>
                    <table class="card-table" id="cardTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>カード名</th>
                                <th>枚数</th>
                                <th>所持</th>
                                <th>欠損</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="5" class="preview-empty">まずはデッキJSONを読み込んでください。</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-panel">
                    <h2>欠損カードグリッド</h2>
                    <div class="control-hint">欠損カードの上位16枚を44で表示します。</div>
                    <div class="grid-preview" id="gridPreview">
                        <div class="preview-card preview-empty">欠損カードがありません</div>
                    </div>
                    <div class="canvas-actions">
                        <button class="btn btn-primary" id="generateGridBtn" disabled> グリッドを生成</button>
                        <button class="btn btn-success" id="downloadGridBtn" disabled> グリッドをPNGで保存</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <canvas id="gridCanvas" width="1200" height="1200" style="display:none"></canvas>

    <script>
        const deckFileInput = document.getElementById('deckFileInput');
        const importDeckBtn = document.getElementById('importDeckBtn');
        const resetOwnershipBtn = document.getElementById('resetOwnershipBtn');
        const deckCardCount = document.getElementById('deckCardCount');
        const missingCardCount = document.getElementById('missingCardCount');
        const gridCardCount = document.getElementById('gridCardCount');
        const cardTableBody = document.querySelector('#cardTable tbody');
        const gridPreview = document.getElementById('gridPreview');
        const generateGridBtn = document.getElementById('generateGridBtn');
        const downloadGridBtn = document.getElementById('downloadGridBtn');
        const gridCanvas = document.getElementById('gridCanvas');

        let cardStates = [];

        importDeckBtn.addEventListener('click', () => deckFileInput.click());
        resetOwnershipBtn.addEventListener('click', resetOwnership);
        deckFileInput.addEventListener('change', loadDeckFile);
        generateGridBtn.addEventListener('click', updateGridPreview);
        downloadGridBtn.addEventListener('click', downloadGridImage);

        function loadDeckFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data || (!Array.isArray(data.main) && !Array.isArray(data.ex))) {
                        throw new Error('無効なデッキJSON形式です');
                    }
                    const deckCards = buildDeckCards(data);
                    cardStates = deckCards.map(card => ({ ...card, owned: 0 }));
                    renderCardTable();
                    updateSummary();
                    resetOwnershipBtn.disabled = false;
                    generateGridBtn.disabled = false;
                    downloadGridBtn.disabled = true;
                } catch (error) {
                    alert('読み込みエラー: ' + error.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function buildDeckCards(data) {
            const merged = [];
            const addCards = (list) => {
                if (!Array.isArray(list)) return;
                list.forEach(item => {
                    if (!item.cardName || !item.count) return;
                    const existing = merged.find(c => c.cardName === item.cardName);
                    if (existing) {
                        existing.count += Number(item.count);
                    } else {
                        merged.push({ cardName: item.cardName, count: Number(item.count) });
                    }
                });
            };
            addCards(data.main);
            addCards(data.ex);
            return merged.sort((a, b) => b.count - a.count || a.cardName.localeCompare(b.cardName));
        }

        function renderCardTable() {
            if (cardStates.length === 0) {
                cardTableBody.innerHTML = '<tr><td colspan="5" class="preview-empty">まずはデッキJSONを読み込んでください。</td></tr>';
                return;
            }
            cardTableBody.innerHTML = cardStates.map((card, index) => {
                const missing = Math.max(card.count - card.owned, 0);
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${card.cardName}</td>
                        <td>${card.count}</td>
                        <td>
                            <div class="count-control">
                                <button ${card.owned <= 0 ? 'disabled' : ''} data-action="decrease" data-index="${index}"></button>
                                <span>${card.owned}</span>
                                <button ${card.owned >= card.count ? 'disabled' : ''} data-action="increase" data-index="${index}">＋</button>
                            </div>
                        </td>
                        <td>${missing}</td>
                    </tr>
                `;
            }).join('');
            cardTableBody.querySelectorAll('button').forEach(button => {
                button.addEventListener('click', handleCountButton);
            });
        }

        function handleCountButton(event) {
            const action = event.target.dataset.action;
            const index = Number(event.target.dataset.index);
            if (!cardStates[index]) return;
            if (action === 'increase' && cardStates[index].owned < cardStates[index].count) {
                cardStates[index].owned++;
            }
            if (action === 'decrease' && cardStates[index].owned > 0) {
                cardStates[index].owned--;
            }
            renderCardTable();
            updateSummary();
            downloadGridBtn.disabled = true;
        }

        function updateSummary() {
            const deckTotal = cardStates.reduce((sum, card) => sum + card.count, 0);
            const missingTotal = cardStates.reduce((sum, card) => sum + Math.max(card.count - card.owned, 0), 0);
            const gridTotal = Math.min(16, missingTotal);
            deckCardCount.textContent = deckTotal;
            missingCardCount.textContent = missingTotal;
            gridCardCount.textContent = `${gridTotal} / 16`;
        }

        function updateGridPreview() {
            const missingCards = cardStates
                .filter(card => card.count - card.owned > 0)
                .flatMap(card => Array(card.count - card.owned).fill(card.cardName));

            const gridItems = missingCards.slice(0, 16);
            gridPreview.innerHTML = '';
            if (gridItems.length === 0) {
                gridPreview.innerHTML = '<div class="preview-card preview-empty">欠損カードがありません</div>';
                downloadGridBtn.disabled = true;
                return;
            }

            gridItems.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'preview-card';
                item.innerHTML = `<strong>${index + 1}</strong><span>${name}</span>`;
                gridPreview.appendChild(item);
            });

            for (let i = gridItems.length; i < 16; i++) {
                const item = document.createElement('div');
                item.className = 'preview-card preview-empty';
                item.textContent = '空き枠';
                gridPreview.appendChild(item);
            }

            downloadGridBtn.disabled = false;
            renderCanvas(gridItems);
        }

        function renderCanvas(gridItems) {
            const ctx = gridCanvas.getContext('2d');
            const size = 300;
            gridCanvas.width = size * 4;
            gridCanvas.height = size * 4;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, gridCanvas.width, gridCanvas.height);
            ctx.strokeStyle = '#d1d5db';
            ctx.lineWidth = 4;
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#111827';

            gridItems.forEach((name, index) => {
                const row = Math.floor(index / 4);
                const col = index % 4;
                const x = col * size;
                const y = row * size;
                ctx.strokeRect(x + 10, y + 10, size - 20, size - 20);
                wrapText(ctx, name, x + size / 2, y + size / 2, size - 24, 30);
            });
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            const lines = [];
            words.forEach(word => {
                const testLine = line ? `${line} ${word}` : word;
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && line) {
                    lines.push(line);
                    line = word;
                } else {
                    line = testLine;
                }
            });
            if (line) lines.push(line);
            const offsetY = y - ((lines.length - 1) * lineHeight) / 2;
            lines.forEach((lineText, index) => {
                ctx.fillText(lineText, x, offsetY + index * lineHeight);
            });
        }

        function downloadGridImage() {
            if (gridCanvas.width === 0) return;
            gridCanvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'missing_cards_grid.png';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function resetOwnership() {
            cardStates = cardStates.map(card => ({ ...card, owned: 0 }));
            renderCardTable();
            updateSummary();
            downloadGridBtn.disabled = true;
        }
    </script>
</body>
</html>
