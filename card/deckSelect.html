<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デッキ選択 - 時のアマリス</title>
    <link rel="stylesheet" href="../css/default.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
        }
        .container {
            display: flex;
            max-width: 1200px;
            margin: 2em auto 10em auto;
            gap: 2em;
            padding: 0 2em;
        }
        .sidebar {
            width: 72px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            gap: 0.5rem;
        }
        .main-content {
            flex: 1;
            min-width: 0;
        }
        .page-card {
            background: var(--callout-bg);
            border: 1px solid var(--callout-border);
            border-radius: 18px;
            padding: 2rem;
        }
        h1 {
            margin-top: 0;
            color: var(--text-color);
            font-size: clamp(2rem, 2.7vw, 2.5rem);
        }
        .upload-section {
            background: rgba(139, 158, 125, 0.12);
            border: 2px dashed var(--border-color);
            border-radius: 18px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }
        .upload-section:hover {
            border-color: var(--accent-color);
            background: rgba(139, 158, 125, 0.18);
        }
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .upload-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        .upload-hint {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        input[type="file"] {
            display: none;
        }
        .sample-deck-link {
            margin-bottom: 1.5rem;
        }
        .sample-deck-link a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 700;
        }
        .card-panel {
            background: rgba(139, 158, 125, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-panel h3 {
            margin-top: 0;
            color: var(--text-color);
        }
        .deck-stats {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .deck-stat {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .deck-stat strong {
            color: var(--accent-color);
        }
        .deck-info {
            display: none;
        }
        .deck-info.active {
            display: block;
        }
        .start-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
            font-family: 'MainFont', sans-serif;
        }
        .start-btn:hover:not(:disabled) {
            background: var(--accent-green);
        }
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .sidebar-item {
            display: block;
            margin-bottom: 0.75rem;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid transparent;
            color: var(--text-color);
            background: rgba(255,255,255,0.05);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sidebar-item:hover {
            border-color: var(--accent-color);
            background: rgba(139, 158, 125, 0.18);
        }
        .sidebar-item.active {
            background: var(--accent-color);
            color: #111827;
            border-color: var(--accent-green);
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <a href="cardview.html" class="sidebar-item" title="カード一覧">🎴</a>
            <a href="deckSelect.html" class="sidebar-item active" title="対戦">⚔️</a>
            <a href="rules.html" class="sidebar-item" title="ルール">📖</a>
            <a href="16.html" class="sidebar-item" title="印刷">🖨️</a>
            <a href="../index.html" class="sidebar-item" title="Wikiトップ">🏠</a>
        </aside>
        <main class="main-content">
            <section class="page-card">
                <h1>デッキ選択</h1>

                <label for="deckInput" class="upload-section">
                    <div class="upload-icon">🎴</div>
                    <div class="upload-text">デッキJSONを読み込む</div>
                    <div class="upload-hint">クリックしてファイルを選択</div>
                </label>
                <input type="file" id="deckInput" accept=".json">

                <div class="sample-deck-link">
                    <a href="sample_deck.json" download="sample_deck.json">サンプルデッキをダウンロード</a>
                </div>

                <div class="card-panel deck-info" id="deckInfo">
                    <h3>読み込まれたデッキ</h3>
                    <div class="deck-stats">
                        <div class="deck-stat">通常デッキ: <strong id="mainCount">0</strong>枚</div>
                        <div class="deck-stat">EXデッキ: <strong id="exCount">0</strong>枚</div>
                    </div>
                </div>

                <button class="start-btn" id="startBtn" disabled>対戦開始</button>
            </section>
        </main>
    </div>

    <script>
        let deckData = null;

        document.getElementById('deckInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    deckData = JSON.parse(event.target.result);
                    
                    // デッキ情報を表示
                    const mainCount = deckData.main ? deckData.main.reduce((sum, item) => sum + item.count, 0) : 0;
                    const exCount = deckData.ex ? deckData.ex.reduce((sum, item) => sum + item.count, 0) : 0;
                    
                    document.getElementById('mainCount').textContent = mainCount;
                    document.getElementById('exCount').textContent = exCount;
                    document.getElementById('deckInfo').classList.add('active');
                    document.getElementById('startBtn').disabled = false;
                } catch (error) {
                    alert('デッキの読み込みに失敗しました: ' + error.message);
                }
            };
            reader.readAsText(file);
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!deckData) return;
            
            // デッキデータをlocalStorageに保存
            localStorage.setItem('battleDeck', JSON.stringify(deckData));
            
            // バトル画面に遷移
            window.location.href = 'battle.html';
        });
    </script>
</body>
</html>
