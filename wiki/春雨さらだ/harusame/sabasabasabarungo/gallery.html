<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="まなづるの個人サイト">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
	<link rel="apple-touch-icon" href="../apple-touch-icon-180x180.png" sizes="180x180">
	<link rel="icon" type="image/png" href="../android-chrome-192x192.png" sizes="192x192">
    <title>春雨さらだ - TOP</title>
    <link rel="stylesheet" href="../css/stylesheet.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.7.1/css/lightbox.css" rel="stylesheet">
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gallery - 落書き</h1>
        </header>
        
        <nav class="nav-links">
            <a href="index.html" class="nav-link">◇Top◇</a>
        </nav>

        <section id="about" class="section">
            <h2> らくがき </h2>
            <p><a href="../img/gallery/rakugaki1.png" data-lightbox="ore" data-title="俺の夢は終わらねえ">
                <img class="gall" src="../img/gallery/rakugaki1.png" alt="">
             </a>
             <a href="../img/gallery/rakugak3.png" data-lightbox="rak" data-title="鹿羽有紗">
                <img class="gall" src="../img/gallery/rakugaki3.png" alt="">
             </a>



            </p>
        </section>
        

        <footer>
            <div class="footer-content">
                <img src="../img/banner.png" alt="サイトバナー">
                <p>© 2025 まなづる</p>
            </div>
        </footer>
    </div>


    <button id="backToTopBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>
    <script>
        
    // ボタンの表示・非表示を制御
    window.addEventListener('scroll', function() {
        const backToTopBtn = document.getElementById('backToTopBtn');
        if (window.pageYOffset > 300) {
            backToTopBtn.style.display = 'flex';
        } else {
            backToTopBtn.style.display = 'none';
        }
    });

    // クリック時にページトップにスクロール
    document.getElementById('backToTopBtn').addEventListener('click', function() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });
</script>
<script src="https://code.jquery.com/jquery-1.12.4.min.js" type="text/javascript"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.7.1/js/lightbox.min.js" type="text/javascript"></script>


</body>
</html>
