<!DOCTYPE html>
<html lang="ja">
<head>

	<meta name="description" content="まなづるの個人サイト">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">

	<link rel="icon" type="image/png" href="../android-chrome-192x192.png" sizes="192x192">

<body>
    <button id="backToTopBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>
    <script>
        // ボタンの表示・非表示を制御
        window.addEventListener('scroll', function() {
            const backToTopBtn = document.getElementById('backToTopBtn');
            if (window.pageYOffset > 300) {
                backToTopBtn.style.display = 'flex';
            } else {
                backToTopBtn.style.display = 'none';
            }
        });
    
        // クリック時にページトップにスクロール
        document.getElementById('backToTopBtn').addEventListener('click', function() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>
    


    <div class="container">
        <header>

        </header>
        
        <nav class="nav-links">

            <a href="#browser" class="nav-link">Browser</a>
            <a href="#pc" class="nav-link">PC</a>
        </nav>

            <h2>Browser - ブラウザゲーム</h2>
            <p>ゲーム。ブラウザで遊べる。<br>おむころはテスト用。</p>
            <ul class="game-list">
                <p><a href="WeekEndApocalypse/index.html" class="accent-border">週末黙示録</a></p>
                <p><a href="tenkaga/index.html" class="accent-border">天空の鏡</a></p>
                <p><a href="manaduru/index.html" class="accent-border">しょーるーむ</a></p>
            </ul>
        </section>
        
        <div class="fantasy-divider">❖ ❖ ❖</div>
        
        <section id="pc" class="section">

            <p>ダウンロード必須のパソコン専用ゲーム。<br>ツクールVXAce製はRTPが必須ですわよ。</p>
            <ul class="game-list">
                <p><a href="sabanikusu.zip" class="accent-border">さばにくす☆せかいせいふく</a></p>
            </ul>
        </section>
        

        <footer>
            <div class="footer-content">
                <img src="../img/banner.png" alt="サイトバナー">
                <p>© 2025 まなづる</p>
            </div>
        </footer>
    </div>
</body>
